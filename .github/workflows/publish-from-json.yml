name: Publish Site From JSON

on:
  push:
    branches:
      - main
    paths:
      - workflow_pages.json
      - "*_content.json"
      - workflow_control.json
      - workflow_generate.py
      - scripts/validate_workflow_json.py
      - scripts/validate_index_html.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON structure and content
        run: |
          python scripts/validate_workflow_json.py

      - name: Generate HTML from JSON
        run: |
          python workflow_generate.py < /dev/null

      - name: Resolve generated output files
        run: |
          python - <<'PY'
          import pathlib
          import os
          from workflow_generate import load_json
          root = pathlib.Path(".")
          pages = load_json(root / "workflow_pages.json").get("pages", [])
          outputs = []
          for page in pages:
            output_name = page.get("output_file")
            output_path = root / output_name
            if not output_path.exists():
              raise SystemExit(f"Expected generated file not found: {output_name}")
            outputs.append(output_name)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
            f.write(f"GENERATED_OUTPUTS={' '.join(outputs)}\n")
          PY

      - name: Validate generated HTML files
        run: |
          for file in $GENERATED_OUTPUTS; do
            python scripts/validate_index_html.py "$file"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $GENERATED_OUTPUTS
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Auto-generate HTML from JSON"
          git push
